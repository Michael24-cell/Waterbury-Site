<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waterbury — Operational Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-linen: #FAF9F6;
            --text-main: #1C1C19;
            --linear-dark: #0B0B0C;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-linen); 
            color: var(--text-main);
            line-height: 1.35;
            -webkit-font-smoothing: antialiased;
        }

        .display-serif { 
            font-family: 'Instrument Serif', serif; 
            letter-spacing: -0.04em; /* Tightened tracking for premium feel */
            line-height: 0.85; /* Tightened line-height to fix "tall" text */
        }
        
        /* Glassmorphism */
        .glass-nav { 
            background: rgba(250, 249, 246, 0.85); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(0,0,0,0.03); 
        }

        .shadow-editorial { box-shadow: 0 24px 48px -12px rgba(16, 23, 41, 0.08); }
        .shadow-subtle { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03); }
        .border-delicate { border: 1px solid rgba(28, 28, 25, 0.06); }
        
        .transition-flow { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        .ui-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(28, 28, 25, 0.4);
        }

        /* FAQ Accordion Reset */
        details summary::-webkit-details-marker { display: none; }
        details[open] summary span { transform: rotate(45deg); }

        .mobile-sticky-bar {
            box-shadow: 0 -8px 24px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="selection:bg-[#101729] selection:text-[#FAF9F6]">

@@include:nav@@
@@include:hero@@
@@include:logos@@
@@include:expertise@@
@@include:process@@
@@include:reviews@@
@@include:team@@
@@include:book@@
@@include:faq@@
@@include:cta-final@@
@@include:footer@@
@@include:mobile-bar@@

</body>
</html>
